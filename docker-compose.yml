version: "3.9"

# ═══════════════════════════════════════════════════════════════
# CEDGYM — Docker Compose
# Dev: `docker compose up -d`
# Prod: Dokploy lee este mismo archivo
# ═══════════════════════════════════════════════════════════════

services:
  db:
    image: postgres:16-alpine
    container_name: cedgym-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cedgym}
      POSTGRES_USER: ${POSTGRES_USER:-cedgym}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cedgym_dev_pass}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Bind to loopback only: containers reach the DB via Docker DNS
    # (db:5432) regardless of this mapping, so the host port is just for
    # local dev tools (psql, Prisma Studio). On the VPS, 127.0.0.1 means
    # the internet cannot reach Postgres directly.
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cedgym}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: cedgym-redis
    # AUTH is required: REDIS_PASSWORD must be set or boot fails (we
    # don't fall through to a no-auth instance — that was the last
    # remaining "anyone on the docker network can dump session data"
    # gap from Fase 0). The API/worker reach us via redis://:pwd@redis:6379.
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD env is required}"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD env is required}
    volumes:
      - redisdata:/data
    # Bind to loopback only — same rationale as `db`. The API/worker
    # talk to Redis via the Docker DNS name `redis:6379`, so this host
    # mapping exists purely for local dev (redis-cli -a $REDIS_PASSWORD).
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: cedgym-api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cedgym}:${POSTGRES_PASSWORD:-cedgym_dev_pass}@db:5432/${POSTGRES_DB:-cedgym}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN}
      MP_PUBLIC_KEY: ${MP_PUBLIC_KEY}
      MP_WEBHOOK_SECRET: ${MP_WEBHOOK_SECRET}
      WHATSAPP_BOT_URL: http://whatsapp-bot:3002
      WHATSAPP_BOT_KEY: ${WHATSAPP_BOT_KEY}
      API_PORT: 3001
      API_HOST: 0.0.0.0
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  whatsapp-bot:
    build:
      context: .
      dockerfile: apps/whatsapp-bot/Dockerfile
    container_name: cedgym-whatsapp-bot
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cedgym}:${POSTGRES_PASSWORD:-cedgym_dev_pass}@db:5432/${POSTGRES_DB:-cedgym}
      API_KEY: ${WHATSAPP_BOT_KEY}
      PORT: 3002
      NODE_ENV: ${NODE_ENV:-production}
    volumes:
      - wwebjs_auth:/app/data/wwebjs_auth
    # Bind to loopback only. The API container reaches the bot via
    # the internal DNS name `whatsapp-bot:3002` — the host mapping here
    # is for dev convenience (curl from host) and MUST NOT be public.
    # Public exposure of /sessions/:wsId/qr without auth would let an
    # attacker scan and hijack the workspace's WhatsApp account
    # (audit hallazgo C10).
    ports:
      - "127.0.0.1:3002:3002"
    shm_size: '512mb'
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: cedgym-worker
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cedgym}:${POSTGRES_PASSWORD:-cedgym_dev_pass}@db:5432/${POSTGRES_DB:-cedgym}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      WHATSAPP_BOT_URL: http://whatsapp-bot:3002
      WHATSAPP_BOT_KEY: ${WHATSAPP_BOT_KEY}
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  wwebjs_auth:
