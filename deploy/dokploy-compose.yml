version: "3.8"

# ═══════════════════════════════════════════════════════════════
# CEDGYM — Dokploy Compose (producción)
#
# Se despliega vía Dokploy → Compose → source=github (amaurycolochos7/cedgym).
# Route en Traefik: https://api.187-77-11-79.sslip.io → api:3001
#
# El VPS ya tiene los puertos 3001/3002 ocupados por otros proyectos, por
# eso NO bindeamos puertos al host — Traefik hace el fan-out.
# ═══════════════════════════════════════════════════════════════

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cedgym}
      POSTGRES_USER: ${POSTGRES_USER:-cedgym}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cedgym}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dokploy-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dokploy-network

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cedgym}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-cedgym}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN}
      MP_PUBLIC_KEY: ${MP_PUBLIC_KEY}
      MP_WEBHOOK_SECRET: ${MP_WEBHOOK_SECRET}
      WHATSAPP_BOT_URL: http://whatsapp-bot:3002
      WHATSAPP_BOT_KEY: ${WHATSAPP_BOT_KEY}
      API_PORT: 3001
      API_HOST: 0.0.0.0
      NODE_ENV: ${NODE_ENV:-production}
      API_PUBLIC_URL: ${API_PUBLIC_URL:-https://api.187-77-11-79.sslip.io}
      CORS_ORIGINS: ${CORS_ORIGINS}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.cedgym-api.rule=Host(`api.187-77-11-79.sslip.io`)
      - traefik.http.routers.cedgym-api.entrypoints=websecure
      - traefik.http.routers.cedgym-api.tls.certresolver=letsencrypt
      - traefik.http.routers.cedgym-api-http.rule=Host(`api.187-77-11-79.sslip.io`)
      - traefik.http.routers.cedgym-api-http.entrypoints=web
      - traefik.http.routers.cedgym-api-http.middlewares=redirect-to-https
      - traefik.http.services.cedgym-api.loadbalancer.server.port=3001
    networks:
      - dokploy-network

  whatsapp-bot:
    build:
      context: ..
      dockerfile: apps/whatsapp-bot/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cedgym}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-cedgym}
      API_KEY: ${WHATSAPP_BOT_KEY}
      PORT: 3002
      NODE_ENV: ${NODE_ENV:-production}
    volumes:
      - wwebjs_auth:/app/data/wwebjs_auth
    shm_size: '512mb'
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - dokploy-network

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${API_PUBLIC_URL:-https://api.187-77-11-79.sslip.io}
        NEXT_PUBLIC_MP_PUBLIC_KEY: ${MP_PUBLIC_KEY}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${API_PUBLIC_URL:-https://api.187-77-11-79.sslip.io}
      NEXT_PUBLIC_MP_PUBLIC_KEY: ${MP_PUBLIC_KEY}
      NODE_ENV: production
    depends_on:
      - api
    networks:
      - dokploy-network

  worker:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cedgym}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-cedgym}
      REDIS_URL: redis://redis:6379
      WHATSAPP_BOT_URL: http://whatsapp-bot:3002
      WHATSAPP_BOT_KEY: ${WHATSAPP_BOT_KEY}
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dokploy-network

volumes:
  pgdata:
  redisdata:
  wwebjs_auth:

networks:
  dokploy-network:
    external: true
